version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: recruitment_postgres
    environment:
      POSTGRES_DB: recruitment
      POSTGRES_USER: ${POSTGRES_USER:-recruit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruitpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recruitment_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitment_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      linkedin-mcp:
        condition: service_healthy
      naukri-mcp:
        condition: service_healthy
      ats-mcp:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-recruit}:${POSTGRES_PASSWORD:-recruitpass}@postgres:5432/recruitment
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - LINKEDIN_MCP_URL=http://linkedin-mcp:8001
      - NAUKRI_MCP_URL=http://naukri-mcp:8002
      - ATS_MCP_URL=http://ats-mcp:8003
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recruitment_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  linkedin-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile
    container_name: recruitment_linkedin_mcp
    environment:
      - SERVER_MODULE=mcp_servers.linkedin.server
      - PORT=8001
      - HF_DATASET=InferenceEndpoint/json_resume_dataset
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/tools || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  naukri-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile
    container_name: recruitment_naukri_mcp
    environment:
      - SERVER_MODULE=mcp_servers.naukri.server
      - PORT=8002
      - HF_DATASET=InferenceEndpoint/json_resume_dataset
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/tools || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  ats-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile
    container_name: recruitment_ats_mcp
    environment:
      - SERVER_MODULE=mcp_servers.ats.server
      - PORT=8003
      - HF_DATASET=InferenceEndpoint/json_resume_dataset
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/tools || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: recruitment_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: recruitment_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: recruitment_otel
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./monitoring/otel-config.yml:/etc/otel/config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    depends_on:
      - prometheus

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: recruitment_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.13.0
    container_name: recruitment_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
      linkedin-mcp:
        condition: service_healthy
      naukri-mcp:
        condition: service_healthy
      ats-mcp:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
